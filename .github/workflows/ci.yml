name: CI Quality Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: livewallwithruby_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config ffmpeg

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Prepare database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/livewallwithruby_test
        run: bin/rails db:test:prepare

      - name: 🧪 Run Unit Tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/livewallwithruby_test
        run: |
          bundle exec rspec spec/controllers/ spec/models/ --format documentation
          echo "========================================="
          echo "✅ Unit Tests Passed Successfully!"
          echo "========================================="

      - name: 📜 Run Contract Tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/livewallwithruby_test
        run: |
          bundle exec rspec spec/requests/ --format documentation
          echo "========================================="
          echo "✅ Contract Tests Passed Successfully!"
          echo "========================================="
