<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Casamento</title>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #93C572; 
            color: #f0f0f0; 
        }
        .font-handwriting { font-family: 'Kalam', cursive; }

        .nature-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .leaf {
            position: absolute;
            top: -100px;
            background: #14533b; 
            border-radius: 0 100% 0 100%; 
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.1);
            opacity: 0.3;
            animation: sway-leaf 10s ease-in-out infinite, fall 20s linear infinite;
        }
        .leaf::after { 
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .flower {
            position: absolute;
            top: -50px;
            width: 10px; height: 10px;
            background: #fde047; 
            border-radius: 50%;
            box-shadow: 0 -8px 0 1px rgba(255,255,255,0.9), 0 8px 0 1px rgba(255,255,255,0.9), 8px 0 0 1px rgba(255,255,255,0.9), -8px 0 0 1px rgba(255,255,255,0.9);
            opacity: 0.8;
            animation: sway-flower 15s ease-in-out infinite, fall 22s linear infinite;
        }

        @keyframes sway-leaf {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(100px) rotate(45deg); }
        }
        @keyframes sway-flower {
            0% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(80px) rotate(180deg); }
            100% { transform: translateX(0) rotate(360deg); }
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .leaf:nth-child(1) { left: 5%; width: 40px; height: 40px; animation-duration: 12s, 18s; animation-delay: 0s, 0s; }
        .leaf:nth-child(2) { left: 15%; width: 60px; height: 60px; animation-duration: 15s, 22s; animation-delay: -2s, -5s; background: #1b694b;}
        .leaf:nth-child(3) { left: 25%; width: 30px; height: 30px; animation-duration: 10s, 15s; animation-delay: -4s, -2s; }
        .leaf:nth-child(4) { left: 35%; width: 50px; height: 50px; animation-duration: 14s, 25s; animation-delay: -1s, -8s; background: #0f402e;}
        .leaf:nth-child(5) { left: 45%; width: 70px; height: 70px; animation-duration: 16s, 20s; animation-delay: -3s, -4s; }
        .leaf:nth-child(6) { left: 55%; width: 45px; height: 45px; animation-duration: 13s, 19s; animation-delay: -5s, -1s; }
        .leaf:nth-child(7) { left: 65%; width: 55px; height: 55px; animation-duration: 17s, 24s; animation-delay: -2s, -7s; background: #1b694b;}
        .leaf:nth-child(8) { left: 75%; width: 35px; height: 35px; animation-duration: 11s, 16s; animation-delay: -6s, -3s; }
        .leaf:nth-child(9) { left: 85%; width: 50px; height: 50px; animation-duration: 14s, 21s; animation-delay: -4s, -2s; background: #0f402e;}
        .leaf:nth-child(10) { left: 95%; width: 65px; height: 65px; animation-duration: 18s, 26s; animation-delay: -1s, -6s; }
        .leaf:nth-child(11) { left: 10%; width: 25px; height: 25px; animation-duration: 9s, 14s; animation-delay: -7s, -9s; background: #1b694b;}
        .leaf:nth-child(12) { left: 80%; width: 40px; height: 40px; animation-duration: 12s, 19s; animation-delay: -3s, -5s; }

        .flower:nth-child(13) { left: 20%; animation-duration: 12s, 18s; animation-delay: -1s, -2s; }
        .flower:nth-child(14) { left: 40%; animation-duration: 14s, 21s; animation-delay: -3s, -5s; }
        .flower:nth-child(15) { left: 60%; animation-duration: 11s, 17s; animation-delay: -5s, -1s; }
        .flower:nth-child(16) { left: 80%; animation-duration: 15s, 23s; animation-delay: -2s, -7s; }
        .flower:nth-child(17) { left: 30%; animation-duration: 13s, 20s; animation-delay: -4s, -4s; }
        .flower:nth-child(18) { left: 70%; animation-duration: 16s, 24s; animation-delay: -6s, -3s; }

        #photo-wall-container { position: absolute; top: 120px; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; gap: 1rem; padding: 1rem 0; }
        @media (min-width: 768px) {
            #photo-wall-container { top: 150px; gap: 2rem; padding: 2rem 0; }
        }
        
        .scroll-row {
            display: flex;
            flex-wrap: nowrap;
            width: max-content;
            will-change: transform;
        }
        
        .polaroid { 
            background-color: white; 
            padding: 0.5rem; 
            padding-bottom: 3.5rem; 
            border-radius: 0.125rem; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); /* Sombra mais destacada */
            width: 200px; 
            margin: 0 0.75rem; 
            flex-shrink: 0; 
            position: relative; 
            transition: transform 0.2s ease-in-out; 
            cursor: pointer; 
        }
        @media (min-width: 640px) { .polaroid { width: 400px; margin: 0 1rem; } }
        @media (min-width: 1024px) { .polaroid { width: 440px; } }
        .polaroid:hover { transform: scale(1.1); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7); z-index: 10; }
        .polaroid .media { width: 100%; height: auto; aspect-ratio: 4 / 3; object-fit: cover; background-color: #e5e7eb; }
        .polaroid .caption { position: absolute; bottom: 0.75rem; left: 0; right: 0; text-align: center; font-size: 1.125rem; color: #1f2937; }
        @media (min-width: 768px) { .polaroid .caption { font-size: 1.25rem; } }
        
        .upload-button { position: fixed; bottom: 1rem; right: 1rem; background-color: #4f46e5; color: white; padding: 0.75rem; border-radius: 9999px; display: flex; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,.3); z-index: 20; text-decoration: none; transition: transform 0.2s; }
        @media (min-width: 768px) { .upload-button { bottom: 2rem; right: 2rem; padding: 1rem; } }
        .upload-button:hover { transform: scale(1.1); }
        .upload-button svg { width: 1.5rem; height: 1.5rem; }
        #lightbox-content img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="nature-container">
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="flower"></div><div class="flower"></div><div class="flower"></div>
        <div class="flower"></div><div class="flower"></div><div class="flower"></div>
    </div>

    <div id="display-view" class="p-4 md:p-8 flex flex-col h-screen">
        <header class="text-center mb-4 md:mb-8 z-10 flex-shrink-0">
           <h1 class="text-3xl sm:text-4xl md:text-6xl font-bold text-white font-handwriting" style="text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(212, 175, 55, 0.6), 0 0 30px rgba(212, 175, 55, 0.4);">Galeria Zappa Ricetto</h1>
        </header>
        <main id="photo-wall-container" class="w-full flex-grow">
            <div class="scroll-row" id="row1"></div>
            <div class="scroll-row" id="row2"></div>
        </main>
        <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-gray-500 z-0 pointer-events: none;">
            <p class="text-2xl bg-black bg-opacity-20 p-4 rounded-lg">Aguardando as primeiras mídias...</p>
        </div>
    </div>

    <a id="upload-link" href="wedding_upload.html" class="upload-button">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
     </a>

    <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden cursor-pointer">
        <div id="lightbox-content" class="relative"></div>
        <button id="lightbox-close" class="absolute top-4 right-6 text-white text-5xl font-bold cursor-pointer">&times;</button>
    </div>

    <script>
        const RAILS_API_URL = '/photos';
        const VIDEO_API_URL = '/videos';

        let row1, row2, emptyState, lightbox, lightboxContent, lightboxClose;
        const POLLING_INTERVAL = 10000;
        
        let displayedMediaIds = new Set();
        let lastFetchTime = null;
        let nextRowIndex = 0;

        let animationFrameId;
        const NORMAL_SPEED = 0.75;
        const FAST_SPEED = 3;
        let xPos1 = 0, xPos2 = 0;
        let currentSpeed1 = NORMAL_SPEED, currentSpeed2 = NORMAL_SPEED;
        let isScrolling = false;


        document.addEventListener('DOMContentLoaded', () => {
            row1 = document.getElementById('row1');
            row2 = document.getElementById('row2');
            emptyState = document.getElementById('empty-state');
            lightbox = document.getElementById('lightbox');
            lightboxContent = document.getElementById('lightbox-content');
            lightboxClose = document.getElementById('lightbox-close');
            
            row1.addEventListener('mouseenter', () => { currentSpeed1 = FAST_SPEED; });
            row1.addEventListener('mouseleave', () => { currentSpeed1 = NORMAL_SPEED; });
            row2.addEventListener('mouseenter', () => { currentSpeed2 = FAST_SPEED; });
            row2.addEventListener('mouseleave', () => { currentSpeed2 = NORMAL_SPEED; });

            fetchAllMedia();
            setInterval(fetchAllMedia, POLLING_INTERVAL);

            lightboxClose.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });
        });

        async function fetchAllMedia() {
            try {
                let photosUrl = RAILS_API_URL;
                let videosUrl = VIDEO_API_URL;

                if (lastFetchTime) {
                    photosUrl += `?since=${encodeURIComponent(lastFetchTime)}`;
                    videosUrl += `?since=${encodeURIComponent(lastFetchTime)}`;
                }

                const [photosResponse, videosResponse, activePhotosRes, activeVideosRes] = await Promise.all([
                    fetch(photosUrl),
                    fetch(videosUrl),
                    fetch(RAILS_API_URL + '/active_ids'),
                    fetch(VIDEO_API_URL + '/active_ids')
                ]);
                
                const albums = photosResponse.ok ? await photosResponse.json() : [];
                const videos = videosResponse.ok ? await videosResponse.json() : [];
                const activePhotoIds = activePhotosRes.ok ? await activePhotosRes.json() : [];
                const activeVideoIds = activeVideosRes.ok ? await activeVideosRes.json() : [];
                
                if (albums.length > 0 || videos.length > 0) {
                    const allCreatedDates = [...albums, ...videos].map(item => new Date(item.created_at));
                    const latestDate = new Date(Math.max(...allCreatedDates));
                    
                    if (!lastFetchTime || latestDate > new Date(lastFetchTime)) {
                        lastFetchTime = latestDate.toISOString();
                    }
                }

                processMediaUpdates(albums, videos);
                processDeletions(activePhotoIds, activeVideoIds);
            } catch (error) {
                console.error("Erro ao buscar mídias da API Rails:", error);
            }
        }

        function processDeletions(activePhotoIds, activeVideoIds) {
            const activeSet = new Set([
                ...activePhotoIds.map(id => `photo-${id}-0`),
                ...activeVideoIds.map(id => `video-${id}`)
            ]);

            for (const id of displayedMediaIds) {
                if (!activeSet.has(id)) {
                    const elements = document.querySelectorAll(`[id="${id}"]`);
                    elements.forEach(el => {
                        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                        el.style.opacity = '0';
                        el.style.transform = 'scale(0)';
                        setTimeout(() => el.remove(), 500);
                    });
                    displayedMediaIds.delete(id);
                }
            }
            
            emptyState.style.display = displayedMediaIds.size === 0 ? 'flex' : 'none';
        }

        function processMediaUpdates(albums, videos) {
            const newPhotoList = albums.flatMap((album) =>
                album.image_urls.map((url, imageIndex) => ({
                    id: `photo-${album.id}-${imageIndex}`,
                    url: url,
                    createdAt: album.created_at
                }))
            );
            const validVideos = videos.filter(video => video && video.gif_url);
            const newVideoList = validVideos.map(video => ({
                    id: `video-${video.id}`,
                    url: video.gif_url,
                    createdAt: video.created_at
            }));
            
            const allMediaFromServer = [...newPhotoList, ...newVideoList];
            allMediaFromServer.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

            const newItems = allMediaFromServer.filter(item => !displayedMediaIds.has(item.id));

            if (newItems.length > 0) {
                addItemsToDOM(newItems);
            }
            
            emptyState.style.display = displayedMediaIds.size === 0 ? 'flex' : 'none';
        }

        function addItemsToDOM(items) {
            items.forEach(item => {
                const targetRow = nextRowIndex % 2 === 0 ? row1 : row2;
                const polaroid = createPolaroidElement(item);
                targetRow.prepend(polaroid); 
                displayedMediaIds.add(item.id);
                nextRowIndex++;
            });
            checkAndApplyScroll();
        }

        function createPolaroidElement(item) {
            const container = document.createElement('div');
            container.className = 'polaroid';
            container.id = item.id;
            
            const mediaElement = document.createElement('img');
            mediaElement.src = item.url;
            mediaElement.className = 'media';
            
            const caption = document.createElement('p');
            caption.textContent = 'A & G';
            caption.className = 'font-handwriting caption';
            
            const randomRotation = (Math.random() - 0.5) * 8;
            container.style.transform = `rotate(${randomRotation}deg)`;
            container.addEventListener('click', () => openLightbox(item));
            
            container.appendChild(mediaElement);
            container.appendChild(caption);
            return container;
        }

        function animate() {
            if (!isScrolling) return;
            xPos1 -= currentSpeed1;
            xPos2 += currentSpeed2;
            if (row1.scrollWidth > 0 && xPos1 < -row1.scrollWidth / 2) { xPos1 = 0; }
            if (row2.scrollWidth > 0 && xPos2 > row2.scrollWidth / 2) { xPos2 = 0; }
            row1.style.transform = `translateX(${xPos1}px)`;
            row2.style.transform = `translateX(${-xPos2}px)`;
            animationFrameId = requestAnimationFrame(animate);
        }

        function startAnimation() {
            if (!isScrolling) {
                isScrolling = true;
                animate();
            }
        }

        function stopAnimation() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            isScrolling = false;
        }

        function checkAndApplyScroll() {
            setTimeout(() => {
                const containerWidth = document.getElementById('photo-wall-container').clientWidth;
                let shouldScroll = false;
                [row1, row2].forEach(row => {
                    const originalChildren = Array.from(row.children).filter(child => !child.classList.contains('clone'));
                    row.innerHTML = '';
                    originalChildren.forEach(child => row.appendChild(child));

                    if (row.scrollWidth > containerWidth) {
                        shouldScroll = true;
                        duplicateRowContent(row);
                    }
                });
                if (shouldScroll) {
                    startAnimation();
                } else {
                    stopAnimation();
                }
            }, 200);
        }

        function duplicateRowContent(row) {
            const children = Array.from(row.children);
            if (children.length === 0) return;
            if (row.scrollWidth > 0 && children.length > 1 && row.scrollWidth <= (children.length * children[0].offsetWidth * 1.5)) {
                 children.forEach(child => {
                    const clone = child.cloneNode(true);
                    clone.classList.add('clone');
                    const originalMediaData = { id: child.id, url: child.querySelector('img').src };
                    clone.addEventListener('click', () => openLightbox(originalMediaData));
                    row.appendChild(clone);
                });
            }
        }

        function openLightbox(mediaData) {
            lightboxContent.innerHTML = '';
            const img = document.createElement('img');
            img.src = mediaData.url;
            lightboxContent.appendChild(img);
            lightbox.classList.remove('hidden');
        }

        function closeLightbox() {
            lightboxContent.innerHTML = '';
            lightbox.classList.add('hidden');
        }
    </script>
</body>
</html>
