<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Mídias para o Casamento</title>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #93C572; color: #f0f0f0; overflow: hidden; }
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 4 / 3; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 0.375rem; }
        .remove-btn { position: absolute; top: -0.5rem; right: -0.5rem; background-color: rgba(239, 68, 68, 0.9); color: white; border-radius: 9999px; width: 1.75rem; height: 1.75rem; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid white; transition: transform 0.2s; }
        
        .nature-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .leaf {
            position: absolute;
            top: -100px;
            background: #14533b; 
            border-radius: 0 100% 0 100%; 
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.1);
            opacity: 0.3;
            animation: sway-leaf 10s ease-in-out infinite, fall 20s linear infinite;
        }
        .leaf::after { 
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .flower {
            position: absolute;
            top: -50px;
            width: 10px; height: 10px;
            background: #fde047; 
            border-radius: 50%;
            box-shadow: 0 -8px 0 1px rgba(255,255,255,0.9), 0 8px 0 1px rgba(255,255,255,0.9), 8px 0 0 1px rgba(255,255,255,0.9), -8px 0 0 1px rgba(255,255,255,0.9);
            opacity: 0.8;
            animation: sway-flower 15s ease-in-out infinite, fall 22s linear infinite;
        }

        @keyframes sway-leaf {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(100px) rotate(45deg); }
        }
        @keyframes sway-flower {
            0% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(80px) rotate(180deg); }
            100% { transform: translateX(0) rotate(360deg); }
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .leaf:nth-child(1) { left: 5%; width: 40px; height: 40px; animation-duration: 12s, 18s; animation-delay: 0s, 0s; }
        .leaf:nth-child(2) { left: 15%; width: 60px; height: 60px; animation-duration: 15s, 22s; animation-delay: -2s, -5s; background: #1b694b;}
        .leaf:nth-child(3) { left: 25%; width: 30px; height: 30px; animation-duration: 10s, 15s; animation-delay: -4s, -2s; }
        .leaf:nth-child(4) { left: 35%; width: 50px; height: 50px; animation-duration: 14s, 25s; animation-delay: -1s, -8s; background: #0f402e;}
        .leaf:nth-child(5) { left: 45%; width: 70px; height: 70px; animation-duration: 16s, 20s; animation-delay: -3s, -4s; }
        .leaf:nth-child(6) { left: 55%; width: 45px; height: 45px; animation-duration: 13s, 19s; animation-delay: -5s, -1s; }
        .leaf:nth-child(7) { left: 65%; width: 55px; height: 55px; animation-duration: 17s, 24s; animation-delay: -2s, -7s; background: #1b694b;}
        .leaf:nth-child(8) { left: 75%; width: 35px; height: 35px; animation-duration: 11s, 16s; animation-delay: -6s, -3s; }
        .leaf:nth-child(9) { left: 85%; width: 50px; height: 50px; animation-duration: 14s, 21s; animation-delay: -4s, -2s; background: #0f402e;}
        .leaf:nth-child(10) { left: 95%; width: 65px; height: 65px; animation-duration: 18s, 26s; animation-delay: -1s, -6s; }
        .leaf:nth-child(11) { left: 10%; width: 25px; height: 25px; animation-duration: 9s, 14s; animation-delay: -7s, -9s; background: #1b694b;}
        .leaf:nth-child(12) { left: 80%; width: 40px; height: 40px; animation-duration: 12s, 19s; animation-delay: -3s, -5s; }

        .flower:nth-child(13) { left: 20%; animation-duration: 12s, 18s; animation-delay: -1s, -2s; }
        .flower:nth-child(14) { left: 40%; animation-duration: 14s, 21s; animation-delay: -3s, -5s; }
        .flower:nth-child(15) { left: 60%; animation-duration: 11s, 17s; animation-delay: -5s, -1s; }
        .flower:nth-child(16) { left: 80%; animation-duration: 15s, 23s; animation-delay: -2s, -7s; }
        .flower:nth-child(17) { left: 30%; animation-duration: 13s, 20s; animation-delay: -4s, -4s; }
        .flower:nth-child(18) { left: 70%; animation-duration: 16s, 24s; animation-delay: -6s, -3s; }
        .back-to-mural-button { position: fixed; bottom: 2rem; left: 2rem; background-color: #374151; color: white; padding: 1rem; border-radius: 9999px; display: flex; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,.3); z-index: 20; text-decoration: none; transition: transform 0.2s; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="nature-container">
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="flower"></div><div class="flower"></div><div class="flower"></div>
        <div class="flower"></div><div class="flower"></div><div class="flower"></div>
    </div>

    <div class="p-4 sm:p-8 flex flex-col items-center justify-center min-h-screen relative z-10">
        <div class="bg-gray-900 bg-opacity-80 backdrop-blur-sm text-white rounded-2xl shadow-2xl p-6 sm:p-8 max-w-lg w-full text-center">
            
            <div id="initial-view">
                <h2 class="text-3xl font-bold mb-2">Compartilhe suas Mídias!</h2>
                <p class="text-gray-300 mb-6">Envie fotos ou vídeos de até 10 segundos.</p>
                <div class="space-y-4">
                    <button id="take-photo-button" class="w-full bg-red-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-red-700 transition-colors">📷 Tirar Foto</button>
                    <button id="choose-photos-button" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition-colors">🖼️ Escolher da Galeria</button>
                    <button id="record-video-button" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition-colors">📹 Gravar Vídeo</button>
                    <button id="choose-video-button" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors">🎥 Escolher Vídeo da Galeria</button>
                </div>
            </div>

            <input type="file" id="camera-input" class="hidden" accept="image/*" capture="camera">
            <input type="file" id="record-video-input" class="hidden" accept="video/*" capture="camcorder">
            
            <input type="file" id="gallery-input" class="hidden" accept="image/jpeg,image/png,image/gif" multiple>
            <input type="file" id="video-gallery-input" class="hidden" accept="video/*" multiple>

            <div id="preview-container" class="hidden text-left">
                <h3 class="text-xl font-bold mb-4">Fotos Selecionadas</h3>
                <div id="thumbnail-grid" class="grid grid-cols-3 sm:grid-cols-4 gap-4 max-h-60 overflow-y-auto p-2 bg-gray-800 rounded-lg border"></div>
                <div class="mt-6 flex flex-col sm:flex-row gap-4">
                    <button id="upload-button" class="w-full bg-green-500 text-white font-bold py-3 px-6 rounded-lg hover:bg-green-600">Enviar Fotos 🚀</button>
                    <button id="cancel-button" class="w-full bg-gray-500 text-white font-bold py-3 px-6 rounded-lg hover:bg-gray-600">Cancelar</button>
                </div>
            </div>

            <div id="loading-spinner" class="hidden mt-6">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto"></div>
                <p class="mt-4 text-gray-400">Enviando...</p>
            </div>
            
            <div id="success-message" class="hidden mt-6 text-green-400">
                <p class="text-2xl font-bold">Mídia enviada com sucesso!</p>
                <button id="send-more-button" class="mt-4 bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg">Enviar Mais Mídias</button>
            </div>
        </div>
    </div>
    
    <a href="wedding.html" class="back-to-mural-button">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.158 0a.075.075 0 10-1.5 0 .075.075 0 001.5 0z" /></svg>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const RAILS_API_URL = '/photos';
            const VIDEO_API_URL = '/videos';
            
            const MAX_FILES = 10;
            const initialView = document.getElementById('initial-view');
            const previewContainer = document.getElementById('preview-container');
            const loadingSpinner = document.getElementById('loading-spinner');
            const successMessage = document.getElementById('success-message');
            
            const takePhotoButton = document.getElementById('take-photo-button');
            const choosePhotosButton = document.getElementById('choose-photos-button');
            const recordVideoButton = document.getElementById('record-video-button');
            const chooseVideoButton = document.getElementById('choose-video-button');

            const cameraInput = document.getElementById('camera-input');
            const galleryInput = document.getElementById('gallery-input');
            const recordVideoInput = document.getElementById('record-video-input');
            const videoGalleryInput = document.getElementById('video-gallery-input');
            
            const uploadButton = document.getElementById('upload-button');
            const cancelButton = document.getElementById('cancel-button');
            const sendMoreButton = document.getElementById('send-more-button');
            const thumbnailGrid = document.getElementById('thumbnail-grid');
            let selectedFiles = [];
            let selectedVideo = null;

            takePhotoButton.addEventListener('click', () => cameraInput.click());
            choosePhotosButton.addEventListener('click', () => galleryInput.click());
            recordVideoButton.addEventListener('click', () => recordVideoInput.click());
            chooseVideoButton.addEventListener('click', () => videoGalleryInput.click());

            cameraInput.addEventListener('change', handleCameraSelect);
            galleryInput.addEventListener('change', handleFileSelect);
            recordVideoInput.addEventListener('change', handleVideoSelect);
            videoGalleryInput.addEventListener('change', handleVideoGallerySelect);

            cancelButton.addEventListener('click', resetUI);
            sendMoreButton.addEventListener('click', resetUI);

            function handleVideoSelect(event) {
                const file = event.target.files[0];
                if (!file) return;

                const videoElement = document.createElement('video');
                videoElement.preload = 'metadata';
                videoElement.onloadedmetadata = () => {
                    window.URL.revokeObjectURL(videoElement.src);
                    if (videoElement.duration > 10.99) {
                        alert('O vídeo deve ter no máximo 10 segundos. Por favor, edite o vídeo e tente novamente.');
                        return;
                    }
                    selectedVideo = file;
                    uploadVideo();
                };
                videoElement.src = URL.createObjectURL(file);
                event.target.value = '';
            }

            function handleCameraSelect(event) {
                const files = Array.from(event.target.files);
                if (files.length === 0) return;
                // Exatamente 1 foto da câmera
                selectedFiles = [files[0]];
                renderThumbnails();
                showView('preview');
                event.target.value = '';
            }

            async function handleVideoGallerySelect(event) {
                const files = Array.from(event.target.files);
                if (files.length === 0) return;
                if (files.length > 5) {
                    alert('Você pode selecionar no máximo 5 vídeos da galeria.');
                    return;
                }
                
                showView('loading-spinner');
                let hasError = false;
                let processed = 0;

                for(const file of files) {
                    const isValid = await checkVideoDuration(file);
                    if (!isValid) {
                        alert(`O vídeo ${file.name} tem mais de 10 segundos e foi ignorado.`);
                        hasError = true;
                        continue;
                    }
                    const formData = new FormData();
                    formData.append('video[upload]', file);
                    try {
                        const res = await fetch(VIDEO_API_URL, { method: 'POST', body: formData });
                        if (res.ok) {
                            processed++;
                        } else {
                            hasError = true;
                        }
                    } catch(e) {
                        hasError = true;
                    }
                }

                if (processed > 0 && !hasError) {
                    showView('success-message');
                } else if (processed > 0 && hasError) {
                    alert('Alguns vídeos falharam no envio ou excederam o limite de tempo.');
                    showView('success-message');
                } else {
                    alert('Nenhum vídeo pôde ser enviado.');
                    showView('initial-view');
                }
                
                event.target.value = '';
            }

            function checkVideoDuration(file) {
                return new Promise((resolve) => {
                    const videoElement = document.createElement('video');
                    videoElement.preload = 'metadata';
                    videoElement.onloadedmetadata = () => {
                        window.URL.revokeObjectURL(videoElement.src);
                        resolve(videoElement.duration <= 10.99);
                    };
                    videoElement.onerror = () => resolve(false);
                    videoElement.src = URL.createObjectURL(file);
                });
            }

            function handleFileSelect(event) {
                const files = Array.from(event.target.files);
                if (files.length === 0) return;
                if ((selectedFiles.length + files.length) > MAX_FILES) {
                    alert(`Você pode selecionar no máximo ${MAX_FILES} fotos por vez.`);
                    return;
                }
                selectedFiles.push(...files);
                renderThumbnails();
                showView('preview');
                event.target.value = '';
            }

            function renderThumbnails() {
                thumbnailGrid.innerHTML = '';
                selectedFiles.forEach((file, index) => {
                    const container = document.createElement('div');
                    container.className = 'thumbnail-container';
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-btn';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.onclick = () => removeFile(index);
                    container.appendChild(img);
                    container.appendChild(removeBtn);
                    thumbnailGrid.appendChild(container);
                });
            }

            function removeFile(indexToRemove) {
                selectedFiles.splice(indexToRemove, 1);
                renderThumbnails();
                if (selectedFiles.length === 0) showView('initial');
            }

            function showView(viewName) {
                ['initial-view', 'preview-container', 'loading-spinner', 'success-message'].forEach(id => document.getElementById(id).classList.add('hidden'));
                const elementId = viewName === 'preview' ? 'preview-container' : (viewName === 'initial' ? 'initial-view' : viewName);
                document.getElementById(elementId).classList.remove('hidden');
            }

            function resetUI() {
                selectedFiles = [];
                selectedVideo = null;
                thumbnailGrid.innerHTML = '';
                showView('initial-view');
            }

            uploadButton.addEventListener('click', async () => {
                if (selectedFiles.length === 0) return;
                
                showView('loading-spinner');
                uploadButton.disabled = true;

                const formData = new FormData();
                selectedFiles.forEach(file => formData.append('photo[images][]', file));

                try {
                    const response = await fetch(RAILS_API_URL, { method: 'POST', body: formData });
                    if (response.ok) {
                        showView('success-message');
                    } else {
                        const errorData = await response.json();
                        const errorMessages = Object.entries(errorData).map(([field, messages]) => `${field}: ${messages.join(', ')}`).join('\n');
                        alert(`Erro ao enviar:\n${errorMessages}`);
                        showView('preview');
                    }
                } catch (error) {
                    alert('Erro de conexão. Verifique se a API está rodando.');
                    showView('preview');
                } finally {
                    uploadButton.disabled = false;
                }
            });

            async function uploadVideo() {
                if (!selectedVideo) return;
                showView('loading-spinner');

                const formData = new FormData();
                formData.append('video[upload]', selectedVideo);

                try {
                    const response = await fetch(VIDEO_API_URL, { method: 'POST', body: formData });
                    if (response.ok) {
                        showView('success-message');
                    } else {
                        alert('Erro ao enviar o vídeo.');
                        showView('initial-view');
                    }
                } catch (error) {
                    alert('Erro de conexão. Verifique se a API está rodando.');
                    showView('initial-view');
                } finally {
                    selectedVideo = null; 
                }
            }
            showView('initial-view');
        });
    </script>
</body>
</html>
